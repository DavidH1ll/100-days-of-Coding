[tool.ruff]
line-length = 100
target-version = "py311"
# Day folders are tutorial projects. They are excluded from the
# repo-wide lint and format scope so the top-level repo passes
# cleanly today. Plan: gradually re-include Day folders as they
# are cleaned up — start with Day 070 (the maintenance script),
# which already passes.
extend-exclude = [
    ".venv",
    "venv",
    "__pycache__",
    "Day*",
]

[tool.ruff.lint]
# Modern, opinionated set: pycodestyle + pyflakes + warnings + isort + pyupgrade + bugbear + simplify.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line length — handled by formatter
    "B008",  # function call in default argument — common in Flask routes
    "SIM108", # use ternary operator — sometimes less readable
    "SIM105", # contextlib.suppress — sometimes explicit pass is clearer
]

[tool.ruff.lint.per-file-ignores]
# Tests: allow asserts, magic numbers, long lines.
"tests/**/*.py" = ["B011"]
"**/test_*.py" = ["B011"]
"**/*_test.py" = ["B011"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
minversion = "7.0"
# Discover tests in the root tests/ folder (if any) and in each
# refactored day's tests/ subfolder. The Day* pattern is shell-
# friendly; pytest also accepts this directly via testpaths.
testpaths = ["tests", "Day*_*/tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
