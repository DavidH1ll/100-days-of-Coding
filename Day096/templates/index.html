{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Products</h1>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card bg-dark border-secondary h-100 product-card">
            <img src="{{ product.image }}" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
                <span class="badge bg-secondary mb-2 align-self-start">{{ product.category }}</span>
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text text-success fw-bold fs-5">${{ "%.2f"|format(product.price) }}</p>
                <button class="btn btn-outline-light mt-auto add-to-cart" data-id="{{ product.id }}">
                    <i class="fa-solid fa-cart-plus me-1"></i>Add to Cart
                </button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
